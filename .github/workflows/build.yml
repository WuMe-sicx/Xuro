name: Build and Release

on:
  push:
    tags:
      - 'v*'  # 当推送 v 开头的tag时触发，如 v1.0.0
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.27.0'

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整的 git 历史

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/build.gradle', 'android/app/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Get dependencies
        run: flutter pub get

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEY_STORE_PASSWORD }}" >> android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      - name: Create keystore file
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Build APK
        run: flutter build apk --release

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

  build-ios:
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整的 git 历史

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          cd build/ios/iphoneos/
          mkdir Payload
          cp -r Runner.app Payload/
          zip -qq -r -9 app-release.ipa Payload

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/iphoneos/app-release.ipa

  upload:
    runs-on: ubuntu-latest
    needs: [ build-android, build-ios ]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整的 git 历史

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist/
          merge-multiple: true

      - name: List files
        run: tree dist

      - name: Prepare scripts
        run: chmod +x .github/scripts/process_commits.sh

      - name: Get Previous tag
        id: previoustag
        run: |
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            echo "tag=" >> $GITHUB_OUTPUT
            echo "is_first=true" >> $GITHUB_OUTPUT
          else
            echo "tag=${PREVIOUS_TAG}" >> $GITHUB_OUTPUT
            echo "is_first=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate commit messages
        id: commits
        run: |
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          PREV_TAG=${{ steps.previoustag.outputs.tag }}
          DELIMITER="$(openssl rand -hex 16)"
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log "${CURRENT_TAG}" --pretty=format:"%s%n%b" | .github/scripts/process_commits.sh)
          else
            COMMITS=$(git log "${PREV_TAG}..${CURRENT_TAG}" --pretty=format:"%s%n%b" | .github/scripts/process_commits.sh)
          fi
          echo "commits<<${DELIMITER}" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "${DELIMITER}" >> $GITHUB_OUTPUT

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          draft: false
          body: |
            ## 🚧 Pre-release Version

            ### 📋 Release Information
            **Version:** ${{ github.ref_name }}
            **Previous Version:** ${{ steps.previoustag.outputs.tag }}
            **Build Environment:** Flutter ${{ env.FLUTTER_VERSION }}

            ### 📝 Changelog
            ${{ steps.commits.outputs.commits }}

            ### 📦 Distribution
            | File | Description | Purpose |
            |------|-------------|----------|
            | `.apk` | Android Package | Direct installation for testing |
            | `.aab` | Android App Bundle | Google Play Store deployment |
            | `.ipa` | iOS App Archive | iOS device installation |

            ### 🔍 Additional Notes
            - This is a pre-release build intended for testing purposes
            - Features and functionality may not be fully stable
            - Not recommended for production use

            ### 📱 Compatibility
            - Minimum Android SDK: 21 (Android 5.0)
            - Target Android SDK: 33 (Android 13)

            > **Note:** Please report any issues or bugs through the GitHub issue tracker.
          files: |
            dist/flutter-apk/app-release.apk
            dist/bundle/release/app-release.aab
            dist/app-release.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts if not release
        if: startsWith(github.ref, 'refs/tags/') == false
        uses: actions/upload-artifact@v4
        with:
          name: everything
          path: dist/
