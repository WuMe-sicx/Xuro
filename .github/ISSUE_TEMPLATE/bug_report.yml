name: "🐛 Bug 反馈"
description: "提交一个 Bug，帮助我们改进 Xuro"
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间反馈问题！请尽量详细地填写以下信息，这将帮助我们更快地定位和修复问题。

  - type: input
    id: version
    attributes:
      label: Xuro 版本号
      description: "可在 设置 > 关于 中查看"
      placeholder: "例如：v0.1.3"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: 运行平台
      options:
        - Android
        - iOS
        - Windows
        - macOS
        - Linux
        - Web
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: 系统版本
      placeholder: "例如：Android 14 / iOS 17.4 / Windows 11"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: 设备型号
      placeholder: "例如：Pixel 8 / iPhone 15 / 小米14"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: "清晰简洁地描述你遇到的问题"
      placeholder: "告诉我们发生了什么..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: "请列出复现该问题的具体操作步骤"
      value: |
        1. 打开 '...'
        2. 点击 '...'
        3. 滑动到 '...'
        4. 出现错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: "你期望应该发生什么？"
      placeholder: "描述你期望的正确行为..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: "实际发生了什么？"
      placeholder: "描述实际发生的情况..."
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 截图或录屏
      description: "如果可以的话，请添加截图或录屏帮助说明问题"
      placeholder: "拖拽图片到此处上传..."
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 日志信息
      description: "如果有相关的错误日志，请粘贴在此处"
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: "任何其他你认为有助于定位问题的信息"
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索过现有 Issues，确认没有重复提交
          required: true
        - label: 我使用的是最新版本的 Xuro
          required: false
