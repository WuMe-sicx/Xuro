name: "✨ 功能请求"
description: "提出一个新功能或改进建议"
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！好的想法让 Xuro 变得更好。请详细描述你的需求，方便我们评估和实现。

  - type: dropdown
    id: category
    attributes:
      label: 功能类别
      options:
        - 播放器相关
        - UI/界面优化
        - 搜索/浏览
        - 缓存/下载
        - 收藏/播放列表
        - 字幕相关
        - 设置/个性化
        - 性能优化
        - 其他
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 你遇到了什么问题？
      description: "清晰简洁地描述这个功能要解决的痛点（例如：每次都需要手动...，非常不方便）"
      placeholder: "我在使用 Xuro 时，经常遇到..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 你期望的解决方案
      description: "描述你希望如何实现这个功能"
      placeholder: "我希望能够..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: "你是否考虑过其他替代方案？"
      placeholder: "也可以通过...来实现"
    validations:
      required: false

  - type: textarea
    id: mockup
    attributes:
      label: 界面参考/草图
      description: "如果有 UI 相关的建议，可以上传草图或参考截图"
      placeholder: "拖拽图片到此处上传..."
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: 你认为这个功能的优先级如何？
      options:
        - 🔴 高 — 严重影响使用体验
        - 🟡 中 — 有了会更好
        - 🟢 低 — 锦上添花
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: "任何其他相关的上下文或说明"
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索过现有 Issues，确认没有重复提交
          required: true
        - label: 我愿意参与该功能的开发（可选）
          required: false
